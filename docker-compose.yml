services:
  postgres:
    image: postgres:17-alpine
    container_name: mynano-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mynano
      POSTGRES_USER: mynano
      POSTGRES_PASSWORD: mynano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
